<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>Site Blocked — Focus</title>
    <link rel="stylesheet" href="blocked.css" />
  </head>
  <body>
    <div class="orb orb-violet"></div>
    <div class="orb orb-cyan"></div>

    <div class="card">
      <div class="shield">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="url(#g)"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <defs>
            <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#a78bfa" />
              <stop offset="100%" stop-color="#22d3ee" />
            </linearGradient>
          </defs>
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
      </div>

      <h1 class="title">Stay Focused</h1>
      <p class="domain" id="domain-text">This site is blocked</p>

      <div class="divider"></div>

      <p class="quote" id="quote-text"></p>
      <p class="author" id="quote-author"></p>

      <div class="badge">
        <span class="pulse-dot"></span>
        Focus Mode Active
      </div>
    </div>

    <script src="blocked.js"></script>
  </body>
</html>
